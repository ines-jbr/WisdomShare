<h3>My borrowed books</h3>
<hr>

<div class="d-flex flex-column col-12" *ngIf="selectedBook">
    <div class="d-flex flex-column col-6">
        <span><strong>Return and give feedback to:</strong> {{selectedBook.title}}</span>
    </div>
    <div class="d-flex flex-column col-12">
        <form class="row g-3">
            <div class="d-flex gap-3">
                <input [(ngModel)]="feedbackRequest.note" name="note" type="range" class="form-range w-25" min="0" max="5" step="0.5">
                <span>{{feedbackRequest.note}}</span>
            </div>
            <div class="col-12">
                <textarea [(ngModel)]="feedbackRequest.comment" name="comment" rows="4" class="form-control" placeholder="Leave a feedback"></textarea>
            </div>
            <div class="d-flex gap-2">
                <button (click)="returnBook(true)" type="button" class="btn btn-outline-primary">
                    <i class="fas fa-check"></i>&nbsp;Return with feedback
                </button>
                <button (click)="returnBook(false)" type="button" class="btn btn-outline-success">
                    <i class="fas fa-check"></i>&nbsp;Return only
                </button>
                <button (click)="selectedBook = undefined" type="button" class="btn btn-link text-danger">
                    <i class="fas fa-times"></i>&nbsp;Cancel
                </button>
            </div>
        </form>
    </div>
</div>

<div *ngIf="!selectedBook">
    <table class="table table-hover">
        <thead>
        <tr>
            <th scope="col">#</th>
            <th scope="col">Title</th>
            <th scope="col">Author</th>
            <th scope="col">ISBN</th>
            <th scope="col">Rate</th>
            <th scope="col"><i class="fas fa-cogs"></i></th>
        </tr>
        </thead>
        <tbody>
        <tr *ngFor="let book of borrowedBooks.content; let index = index">
            <th scope="row">{{index + 1}}</th>
            <td>{{book.title}}</td>
            <td>{{book.authorName}}</td>
            <td>{{book.isbn}}</td>
            <td><i class="fas fa-star text-warning"></i> {{book.rate}}</td>
            <td>
                <div class="d-flex gap-2">
                    <i *ngIf="book.returned" class="fa-regular fa-circle-check text-success"></i>
                    <i *ngIf="!book.returned" (click)="returnBorrowedBook(book)" class="fa-solid fa-paper-plane text-primary cursor-pointer"></i>
                </div>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="d-flex justify-content-center mt-3">
        <nav aria-label="Page navigation">
            <ul class="pagination">
                <li class="page-item">
                    <a (click)="goToFirstPage()" class="page-link" href="javascript:void(0)" [class.disabled]="page === 0">
                        <i class="fa-solid fa-angles-left"></i>
                    </a>
                </li>
                <li class="page-item">
                    <a (click)="goToPreviousPage()" class="page-link" href="javascript:void(0)" [class.disabled]="page === 0">
                        <i class="fa-solid fa-angle-left"></i>
                    </a>
                </li>
                <li class="page-item" *ngFor="let pageIndex of pages">
                    <a (click)="goToPage(pageIndex)" class="page-link" href="javascript:void(0)" [class.active]="page === pageIndex">
                        {{pageIndex + 1}}
                    </a>
                </li>
                <li class="page-item">
                    <a (click)="goToNextPage()" class="page-link" href="javascript:void(0)" [class.disabled]="isLastPage">
                        <i class="fa-solid fa-angle-right"></i>
                    </a>
                </li>
                <li class="page-item">
                    <a (click)="goToLastPage()" class="page-link" href="javascript:void(0)" [class.disabled]="isLastPage">
                        <i class="fa-solid fa-angles-right"></i>
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</div>
